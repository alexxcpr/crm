services:
  traefik:
    image: traefik:v3.7.5
    container_name: moduvis-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web

  frontend:
    build:
      context: ../client
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
        NUXT_API_BASE_INTERNAL: ${NUXT_API_BASE_INTERNAL:-http://backend:4000/api}
        NUXT_PUBLIC_DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-dev}
        NUXT_PUBLIC_APP_DOMAIN_BASE: ${DOMAIN_BASE}
        NUXT_AUTH_SECURE_COOKIE: ${NUXT_AUTH_SECURE_COOKIE:-false}
        NUXT_AUTH_HTTP_ONLY: ${NUXT_AUTH_HTTP_ONLY:-false}
    container_name: moduvis-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      NUXT_API_BASE_INTERNAL: ${NUXT_API_BASE_INTERNAL:-http://backend:4000/api}
      NUXT_PUBLIC_DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-dev}
      NUXT_PUBLIC_APP_DOMAIN_BASE: ${DOMAIN_BASE}
      NUXT_AUTH_ORIGIN: https://${DEFAULT_TENANT_SLUG:-dev}.${DOMAIN_BASE}
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=moduvis-web
      - traefik.http.routers.moduvis-frontend.rule=HostRegexp(`${TENANT_HOST_REGEXP}`)
      - traefik.http.routers.moduvis-frontend.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.moduvis-frontend.priority=10
      - traefik.http.routers.moduvis-frontend.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.moduvis-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.moduvis-frontend.tls.domains[0].main=${DOMAIN_BASE}
      - traefik.http.routers.moduvis-frontend.tls.domains[0].sans=*.${DOMAIN_BASE}
      - traefik.http.services.moduvis-frontend.loadbalancer.server.port=3000
      - traefik.http.services.moduvis-frontend.loadbalancer.healthcheck.path=/
    networks:
      - web

  backend:
    build:
      context: ../server
    container_name: moduvis-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: https://${DEFAULT_TENANT_SLUG:-dev}.${DOMAIN_BASE}
      DOMAIN_BASE: ${DOMAIN_BASE}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DEFAULT_TENANT_DB:-devdb}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ADMIN_USER: ${DB_ADMIN_USER:-${DB_USER}}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD:-${DB_PASSWORD}}
      META_DB: ${META_DB:-meta}
      PROVISIONING_INTERNAL_SECRET: ${PROVISIONING_INTERNAL_SECRET}
      PROVISIONING_APP_INTERNAL_URL: ${PROVISIONING_APP_INTERNAL_URL:-http://provisioning:3000}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-dev}
      DEFAULT_TENANT_DB: ${DEFAULT_TENANT_DB:-devdb}
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET}
      APP_WEBHOOK_BASE_URL: https://${DEFAULT_TENANT_SLUG:-dev}.${DOMAIN_BASE}/api #in productie de preferat aici http://backend:4000/api daca ca sunt in aceeasi retea
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=moduvis-web
      - traefik.http.routers.moduvis-backend.rule=HostRegexp(`${TENANT_HOST_REGEXP}`) && PathPrefix(`/api`)
      - traefik.http.routers.moduvis-backend.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.moduvis-backend.priority=100
      - traefik.http.routers.moduvis-backend.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.moduvis-backend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.moduvis-backend.tls.domains[0].main=${DOMAIN_BASE}
      - traefik.http.routers.moduvis-backend.tls.domains[0].sans=*.${DOMAIN_BASE}
      - traefik.http.services.moduvis-backend.loadbalancer.server.port=4000
      - traefik.http.services.moduvis-backend.loadbalancer.healthcheck.path=/api/health
    networks:
      - web
      - internal

  postgres:
    image: postgres:16
    container_name: moduvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DEFAULT_TENANT_DB:-devdb}
    ports:
      - "7432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-meta-db.sql:/docker-entrypoint-initdb.d/init-meta-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DEFAULT_TENANT_DB:-devdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - web
      - internal

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-engine
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      N8N_RUNNERS_ENABLED: "true"
      EXECUTIONS_MODE: regular
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB:-n8n_db}
      DB_POSTGRESDB_USER: ${DB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web
      - internal

  provisioning:
    build:
      context: ../../Moduvis-Provisioning
    container_name: moduvis-provisioning
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_SITE_URL: https://moduvis.${DOMAIN_BASE}
      NUXT_PUBLIC_APP_DOMAIN_BASE: ${DOMAIN_BASE}
      NUXT_STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NUXT_STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NUXT_STRIPE_BASE_PRICE_ID: ${STRIPE_BASE_PRICE_ID}
      NUXT_STRIPE_EXTRA_PROFILE_PRICE_ID: ${STRIPE_EXTRA_PROFILE_PRICE_ID}
      NUXT_STRIPE_EXTRA_STORAGE10GB_PRICE_ID: ${STRIPE_EXTRA_STORAGE_10GB_PRICE_ID}
      NUXT_STRIPE_REPORTS_DASHBOARDS_PRICE_ID: ${STRIPE_REPORTS_DASHBOARDS_PRICE_ID}
      STRIPE_BASE_PRICE_ID: ${STRIPE_BASE_PRICE_ID}
      STRIPE_EXTRA_PROFILE_PRICE_ID: ${STRIPE_EXTRA_PROFILE_PRICE_ID}
      STRIPE_EXTRA_STORAGE_10GB_PRICE_ID: ${STRIPE_EXTRA_STORAGE_10GB_PRICE_ID}
      STRIPE_REPORTS_DASHBOARDS_PRICE_ID: ${STRIPE_REPORTS_DASHBOARDS_PRICE_ID}
      NUXT_MODUVIS_INTERNAL_API_URL: http://backend:4000/api
      NUXT_PROVISIONING_INTERNAL_SECRET: ${PROVISIONING_INTERNAL_SECRET}
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=moduvis-web
      - traefik.http.routers.moduvis-provisioning.rule=Host(`moduvis.${DOMAIN_BASE}`)
      - traefik.http.routers.moduvis-provisioning.entrypoints=${TRAEFIK_ENTRYPOINTS:-web}
      - traefik.http.routers.moduvis-provisioning.priority=300
      - traefik.http.routers.moduvis-provisioning.tls=${TRAEFIK_TLS:-false}
      - traefik.http.routers.moduvis-provisioning.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-}
      - traefik.http.routers.moduvis-provisioning.tls.domains[0].main=${DOMAIN_BASE}
      - traefik.http.routers.moduvis-provisioning.tls.domains[0].sans=*.${DOMAIN_BASE}
      - traefik.http.services.moduvis-provisioning.loadbalancer.server.port=3000
      - traefik.http.services.moduvis-provisioning.loadbalancer.healthcheck.path=/
    networks:
      - web
      - internal

networks:
  web:
    name: moduvis-web
  internal:
    name: moduvis-internal
    internal: true

volumes:
  postgres_data:
  n8n_data:
  traefik_letsencrypt:
