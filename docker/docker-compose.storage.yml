name: moduvis-storage-dev

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: moduvis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moduvis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moduvis-development-secret}
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/moduvis-development;
      mc anonymous set none local/moduvis-development"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-moduvis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-moduvis-development-secret}

volumes:
  minio_data:
